project_id = "smartroutes"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.criar-perfil-motorista]
verify_jwt = true

[functions.iniciar-viagem]
verify_jwt = true

[functions.finalizar-viagem]
verify_jwt = true

[functions.webhook-evolution]
verify_jwt = false

[functions.enviar-mensagem]
verify_jwt = true

[functions.reenviar-confirmacao]
verify_jwt = true

[functions.automacao-diaria]
verify_jwt = false

[functions.otimizar-sequencia-passageiros]
verify_jwt = true

[functions.verificar-whatsapp]
verify_jwt = true

[functions.qr-code-whatsapp]
verify_jwt = true

[functions.status-whatsapp]
verify_jwt = true

[functions.registrar-webhook]
verify_jwt = true

[functions.desconectar-whatsapp]
verify_jwt = true
